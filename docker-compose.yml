# Local development services — start with: make up
services:
  app:
    build: .
    volumes:
      - .:/var/www/html
    ports:
      - '8000:8000'
      - '5173:5173'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      typesense:
        condition: service_started

  postgres:
    image: docker.io/postgis/postgis:17-3.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel_sn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  typesense:
    image: typesense/typesense:26.0
    restart: unless-stopped
    environment:
      TYPESENSE_API_KEY: local-dev-key
    command: --data-dir /data
    ports:
      - '8108:8108'
    volumes:
      - typesense_data:/data

volumes:
  postgres_data:
  redis_data:
  typesense_data:
