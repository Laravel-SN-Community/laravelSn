version: 2
updates:
  - package-ecosystem: 'composer'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:00'
      timezone: 'Africa/Dakar'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'php'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      laravel:
        patterns:
          - 'laravel/*'
          - 'illuminate/*'
      dev-dependencies:
        dependency-type: 'development'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:00'
      timezone: 'Africa/Dakar'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'javascript'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      inertia:
        patterns:
          - '@inertiajs/*'
      dev-dependencies:
        dependency-type: 'development'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'ci'
